  .region.north .lbl{background:var(--sky)} .region.cambodia .lbl{background:var(--amber)} .region.south .lbl{background:var(--green)}
  .region h2{font-size:26px;margin:.3em 0 .1em} .region p{color:var(--muted);margin:.2em auto;max-width:640px}
  .day{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);
    padding:26px 26px 10px;margin:22px 0;scroll-margin-top:64px}
  .day-head{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;border-bottom:2px solid var(--line);padding-bottom:12px}
  .daynum{font-family:Helvetica,Arial,sans-serif;font-weight:700;font-size:13px;letter-spacing:.1em;

  .day-summary{color:var(--muted);font-style:italic;margin:14px 0 4px}
  .places{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin:16px 0 14px}
  @media(max-width:720px){.places{grid-template-columns:1fr}}
  .place{display:flex;flex-direction:column}
  .ph{position:relative;width:100%;aspect-ratio:16/10;border-radius:12px;overflow:hidden;background:#dfe6e0}
  .ph img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease}
  .place:hover .ph img{transform:scale(1.05)}
  .ph .ph-label{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    text-align:center;padding:14px;color:#fff;font-family:Helvetica,Arial,sans-serif;font-size:15px;
    background:linear-gradient(135deg,#1f5f4f,#2d6e8e)}

  .tip{font-family:Helvetica,Arial,sans-serif;font-size:13px;background:#f3f5ef;border-left:3px solid var(--gold);

  footer{margin:50px 0 30px;padding-top:20px;border-top:1px solid var(--line);color:var(--muted);
    font-family:Helvetica,Arial,sans-serif;font-size:13px;text-align:center}
  .legend{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin:10px 0}
  .legend span{font-size:12px}

    tip:{en:"Proper shoes; steps are steep and uneven. ~30–40 min up at a relaxed pace. Late-afternoon light is best.",
         pl:"Porządne buty; stopnie są strome i nierówne. Ok. 30–40 min w górę w spokojnym tempie. Najlepsze jest popołudniowe światło."}},
   {img:"hoalu",icon:"🏛",name:{en:"Hoa Lu — the 10th-century capital",pl:"Hoa Lu — stolica z X wieku"},
    what:{en:"Before Hanoi, this was the seat of power — capital of Vietnam's first independent dynasties (Dinh and early Le). Two restored temples honour the founding kings against a dramatic karst backdrop. Small but historically heavyweight: the birthplace of Vietnamese self-rule after a thousand years of Chinese domination.",
          pl:"Przed Hanoi to tu była siedziba władzy — stolica pierwszych niezależnych dynastii Wietnamu (Dinh i wczesna Le). Dwie odrestaurowane świątynie czczą królów-założycieli na dramatycznym krasowym tle. Niewielkie, ale ważkie historycznie: kolebka wietnamskiej niezależności po tysiącu lat chińskiej dominacji."},
    tip:{en:"Combine with the boats and viewpoint as one loop. Quiet and shaded — a good midday history stop.",
         pl:"Połączcie z łodziami i punktem widokowym w jedną pętlę. Cicho i zacienione — dobry południowy przystanek z historią."}}
  ]},

 {n:4,date:{en:"Tue 24 Nov",pl:"wt 24 lis"},
  title:{en:"Lan Ha Bay — board the cruise",pl:"Zatoka Lan Ha — wejście na rejs"},
  summary:{en:"Transfer to the coast and board a junk-style boat in the quieter, prettier sister bay to Halong. Overnight on the water.",
           pl:"Przejazd na wybrzeże i zaokrętowanie na łodzi w stylu dżonki w cichszej, ładniejszej siostrzanej zatoce Halong. Nocleg na wodzie."},
  places:[
   {img:"lanha",icon:"🌿",name:{en:"Lan Ha Bay",pl:"Zatoka Lan Ha"},
    what:{en:"The same drowned-mountain seascape as Halong — hundreds of forested limestone islands in turquoise water — but markedly quieter, with hidden lagoons, floating fishing villages and little beaches tucked between the karsts. Swap the big boat for kayaks and a tender into sea-caves and sheltered coves.",
          pl:"Ten sam zatopiono-górski pejzaż morski co Halong — setki zalesionych wapiennych wysp w turkusowej wodzie — ale wyraźnie cichszy, z ukrytymi lagunami, pływającymi wioskami rybackimi i plażami między krasami. Dużą łódź zamienicie na kajaki i ponton, by wpłynąć do jaskiń morskich i osłoniętych zatoczek."},
    tip:{en:"For a group, charter a cabin-block or a small private junk. November water is cool but kayaking is comfortable.",
         pl:"Dla grupy zarezerwujcie blok kabin lub małą prywatną dżonkę. Listopadowa woda jest chłodna, ale kajakowanie jest komfortowe."}},
   {img:"junk",icon:"🚲",name:{en:"Overnight aboard a junk",pl:"Nocleg na dżonce"},
    what:{en:"The classic experience: a wooden-styled cruise boat where you sleep on the bay itself. Expect a seafood-heavy dinner, sunset from the top deck, squid-fishing after dark, and total silence once the engines cut. Waking surrounded by mist and karst towers is one of the trip's signature moments.",
          pl:"Klasyka: drewniana łódź wycieczkowa, na której śpicie na samej zatoce. Spodziewajcie się kolacji obfitej w owoce morza, zachodu słońca z górnego pokładu, połowu kałamarnic po zmroku i całkowitej ciszy, gdy gasną silniki. Przebudzenie otoczone mgłą i krasowymi wieżami to jeden z najlepszych momentów podróży."},
    tip:{en:"Cabins vary hugely — book a reputable mid-range boat. Confirm the route reaches Lan Ha, not just central Halong.",
         pl:"Kabiny bardzo się różnią — wybierzcie renomowaną łódź średniej klasy. Potwierdźcie, że trasa sięga Lan Ha, nie tylko środka Halong."}}
  ]},

 {n:5,date:{en:"Wed 25 Nov",pl:"śr 25 lis"},
  title:{en:"Bay sunrise → back to Hanoi",pl:"Wschód nad zatoką → powrót do Hanoi"},
  summary:{en:"A final morning on the water, then back to the capital to repack for the flight into Cambodia.",
           pl:"Ostatni poranek na wodzie, a potem powrót do stolicy, by przepakować się przed lotem do Kambodży."},
  places:[
   {img:"halong",icon:"⛰",name:{en:"Sunrise & Ti Top summit",pl:"Wschód słońca i szczyt Ti Top"},
    what:{en:"Early risers get the bay at its best — flat, pearly water and karst silhouettes before the day-boats arrive. Many cruises stop at Ti Top Island, where a short, steep stair climbs to a 360° viewpoint over the scattered islands. Then it's brunch aboard, disembark, and the road back to Hanoi.",
          pl:"Ranne ptaszki dostają zatokę w najlepszym wydaniu — gładką, perłową taflę i sylwetki krasów, zanim nadpłyną dzienne łodzie. Wiele rejsów zatrzymuje się przy wyspie Ti Top, gdzie krótkie, strome schody wiodą do punktu z widokiem 360°. Potem brunch na pokładzie, zejście na ląd i droga powrotna do Hanoi."},
    tip:{en:"Set an alarm for sunrise — it's the whole point. Pack the night before so the morning is unhurried.",
         pl:"Nastawcie budzik na wschód słońca — o to właśnie chodzi. Spakujcie się wieczorem, by poranek był spokojny."}},
   {img:"oldquarter",icon:"🍜",name:{en:"Last night in Hanoi",pl:"Ostatni wieczór w Hanoi"},
    what:{en:"Back in the capital for one more night before flying south. Use the evening to repack, swap warm layers for tropical kit, and have a final northern dinner — a bowl of pho, a plate of cha ca (turmeric-and-dill fish), one last egg coffee. Tomorrow the trip changes country and climate.",
          pl:"Powrót do stolicy na jeszcze jedną noc przed lotem na południe. Wieczór wykorzystajcie na przepakowanie, zamianę ciepłych warstw na tropikalny zestaw i ostatnią północną kolację — miskę pho, talerz cha ca (ryba z kurkumą i koprem), ostatnią kawę jajeczną. Jutro podróż zmienia kraj i klimat."},
    tip:{en:"Keep your Cambodia documents (e-visa, passport, USD cash) in your carry-on — you'll need them on landing.",
         pl:"Dokumenty do Kambodży (e-visa, paszport, gotówka USD) trzymajcie w bagażu podręcznym — przydadzą się zaraz po lądowaniu."}}
  ]},

 {region:"cambodia",
  lbl:{en:"Cambodia — Capital, Coast & Islands",pl:"Kambodża — stolica, wybrzeże i wyspy"},
  rh:{en:"Late Nov / early Dec — dry season opening, warm & tropical",pl:"Koniec lis / początek gru — początek pory suchej, ciepło i tropikalnie"},
  rp:{en:"The capital's heavy history, an off-track island chosen over the party beaches, and an abandoned French hill station in the cloud forest. The dry season is just settling in — warm days, calm seas.",
      pl:"Ciężka historia stolicy, wyspa poza szlakiem wybrana zamiast imprezowych plaż i opuszczone francuskie uzdrowisko w lesie mglistym. Pora sucha dopiero się ustala — ciepłe dni, spokojne morze."}},

 {n:6,date:{en:"Thu 26 Nov",pl:"czw 26 lis"},
  title:{en:"Fly Hanoi → Phnom Penh",pl:"Lot Hanoi → Phnom Penh"},
  summary:{en:"A two-hour flight swaps Vietnam's north for the Cambodian capital, where two great rivers meet. An easy first afternoon by the water.",
           pl:"Dwugodzinny lot zamienia północ Wietnamu na kambodżańską stolicę, gdzie spotykają się dwie wielkie rzeki. Spokojne pierwsze popołudnie nad wodą."},
  places:[
   {img:"royalpalace",icon:"🏛",name:{en:"Royal Palace & Silver Pagoda",pl:"Pałac Królewski i Srebrna Pagoda"},
    what:{en:"Cambodia's working royal residence since the 1860s — a compound of golden-roofed Khmer pavilions, throne halls and the Silver Pagoda, its floor laid with over 5,000 silver tiles and home to an emerald Buddha and a life-size gold one studded with diamonds. A glittering, living counterpoint to the country's harder 20th-century history.",
          pl:"Czynna rezydencja królewska Kambodży od lat 60. XIX wieku — kompleks khmerskich pawilonów o złotych dachach, sal tronowych i Srebrnej Pagody, której podłogę wyłożono ponad 5000 srebrnych płytek; mieści szmaragdowego Buddę i naturalnej wielkości złotego, wysadzanego diamentami. Lśniący, żywy kontrapunkt dla trudniejszej XX-wiecznej historii kraju."},
    tip:{en:"Cover shoulders and knees (a scarf does the job). Go late afternoon as the heat eases and the gold catches low light.",
         pl:"Zakryjcie ramiona i kolana (wystarczy chusta). Idźcie późnym popołudniem, gdy upał słabnie, a złoto chwyta niskie światło."}},
   {img:"ppriver",icon:"⛰",name:{en:"Sisowath Quay & the river confluence",pl:"Sisowath Quay i zbieg rzek"},
    what:{en:"Phnom Penh sits where the Mekong, the Tonlé Sap and the Bassac rivers meet — a broad, busy waterfront promenade where the city comes out to walk at dusk. Grab a riverside seat for a sundowner and watch the boats, the kite-flyers and the food carts. The gentle way to land in a new country.",
          pl:"Phnom Penh leży tam, gdzie spotykają się Mekong, Tonlé Sap i Bassac — szeroka, ruchliwa nadrzeczna promenada, na którą miasto wychodzi o zmierzchu. Zajmijcie miejsce nad rzeką na drinka o zachodzie i patrzcie na łodzie, latawce i wózki z jedzeniem. Łagodny sposób na wylądowanie w nowym kraju."},
    tip:{en:"The quay is best on foot. Tuk-tuks (and the Grab/PassApp ride apps) are the easy, cheap way around the city.",
         pl:"Nabrzeże najlepiej zwiedzać pieszo. Tuk-tuki (oraz aplikacje Grab/PassApp) to łatwy i tani sposób na poruszanie się po mieście."}}
  ]},

 {n:7,date:{en:"Fri 27 Nov",pl:"pt 27 lis"},
  title:{en:"Phnom Penh — the hard history",pl:"Phnom Penh — trudna historia"},
  summary:{en:"A sobering but essential day understanding the Khmer Rouge years, balanced by the serene Khmer art of the National Museum.",
           pl:"Otrzeźwiający, ale niezbędny dzień poświęcony zrozumieniu lat Czerwonych Khmerów, zrównoważony spokojną khmerską sztuką Muzeum Narodowego."},
  places:[
   {img:"tuolsleng",icon:"🏛",name:{en:"Tuol Sleng (S-21) Genocide Museum",pl:"Muzeum Ludobójstwa Tuol Sleng (S-21)"},
    what:{en:"A former school the Khmer Rouge turned into the S-21 prison, where thousands were detained and tortured between 1975 and 1979. The classrooms, cells and harrowing archive of photographs are preserved almost untouched. It is heavy and quiet, and — like Hoa Lo or the War Remnants Museum — it is the necessary context for everything else you'll see in Cambodia.",
          pl:"Dawna szkoła zamieniona przez Czerwonych Khmerów w więzienie S-21, gdzie w latach 1975–1979 przetrzymywano i torturowano tysiące ludzi. Sale lekcyjne, cele i wstrząsające archiwum fotografii zachowano niemal nietknięte. To ciężkie i ciche miejsce i — jak Hoa Lo czy Muzeum Pozostałości Wojny — niezbędny kontekst dla wszystkiego, co jeszcze zobaczycie w Kambodży."},
    tip:{en:"Take the included audio guide — the survivor testimony is what makes it land. Emotionally draining; don't over-schedule the day.",
         pl:"Weźcie dołączony audioprzewodnik — to świadectwa ocalałych robią największe wrażenie. Wyczerpujące emocjonalnie; nie przeładowujcie tego dnia."}},
   {img:"killingfields",icon:"🏛",name:{en:"Choeung Ek Killing Fields",pl:"Pola Śmierci Choeung Ek"},
    what:{en:"About 15 km out of town, the best-known of the killing fields where S-21 prisoners were executed. Today it is a memorial: quiet paths between the grave pits and a central stupa holding thousands of skulls. The audio tour is measured and humane rather than sensational. Pairing it with S-21 completes the story in one day.",
          pl:"Około 15 km za miastem — najbardziej znane z pól śmierci, gdzie egzekwowano więźniów S-21. Dziś to miejsce pamięci: ciche ścieżki między dołami grobowymi i centralna stupa mieszcząca tysiące czaszek. Audioprzewodnik jest wyważony i ludzki, nie sensacyjny. Połączenie z S-21 domyka historię w jeden dzień."},
    tip:{en:"Go in the morning before the heat. A tuk-tuk can wait and bring you back; agree the round-trip fare first.",
         pl:"Jedźcie rano, zanim zrobi się upalnie. Tuk-tuk może poczekać i zawieźć z powrotem; ustalcie cenę za kurs w obie strony z góry."}},
   {img:"natmus",icon:"🌿",name:{en:"National Museum of Cambodia",pl:"Muzeum Narodowe Kambodży"},
    what:{en:"A graceful terracotta pavilion holding the world's finest collection of Khmer sculpture — serene sandstone gods and kings rescued from Angkor and the pre-Angkorian temples. After the morning's weight, an hour here among the Angkorian masterpieces is a deliberate, restorative counterbalance.",
          pl:"Pełen wdzięku terakotowy pawilon mieszczący najwspanialszą na świecie kolekcję khmerskiej rzeźby — spokojne piaskowcowe bóstwa i królowie ocaleni z Angkoru i świątyń przedangkorskich. Po ciężarze poranka godzina wśród angkorskich arcydzieł to celowa, regenerująca przeciwwaga."},
    tip:{en:"Photography is limited inside; the open central courtyard is lovely and free to shoot.",
         pl:"Fotografowanie wewnątrz jest ograniczone; otwarty centralny dziedziniec jest piękny i można go swobodnie fotografować."}}
  ]},

 {n:8,date:{en:"Sat 28 Nov",pl:"sob 28 lis"},
  title:{en:"To the coast → Koh Rong Sanloem",pl:"Na wybrzeże → Koh Rong Sanloem"},
  summary:{en:"Road to the coast, then a fast ferry to a quiet island chosen over the party beaches. The decompression begins.",
           pl:"Droga na wybrzeże, a potem szybki prom na cichą wyspę wybraną zamiast imprezowych plaż. Zaczyna się odprężenie."},
  places:[
   {img:"sihanoukville",icon:"🚲",name:{en:"Phnom Penh → Sihanoukville → ferry",pl:"Phnom Penh → Sihanoukville → prom"},
    what:{en:"A morning coach down the expressway to the port city of Sihanoukville (~3.5–4 h), then the government-fixed fast ferry out across the Gulf of Thailand to Koh Rong Sanloem (40 min–2 h depending on the boat and route). The crossing itself is part of the fun — open water, island silhouettes, the mainland falling away behind.",
          pl:"Poranny autokar autostradą do portowego Sihanoukville (~3,5–4 h), a potem szybki prom o cenie ustalonej przez rząd przez Zatokę Tajlandzką na Koh Rong Sanloem (40 min–2 h zależnie od łodzi i trasy). Sama przeprawa to część przyjemności — otwarta woda, sylwetki wysp, znikający w tyle ląd."},
    tip:{en:"Book the ferry with your resort and tell them which company you're on for a pier pickup. Bring USD cash in small notes — there are no ATMs on the island.",
         pl:"Prom zarezerwujcie przez resort i podajcie firmę przewozową, by odebrali was z pomostu. Weźcie gotówkę USD w małych nominałach — na wyspie nie ma bankomatów."}},
   {img:"saracen",icon:"🌿",name:{en:"Saracen Bay, Koh Rong Sanloem",pl:"Saracen Bay, Koh Rong Sanloem"},
    what:{en:"A three-kilometre crescent of white sand and clear, calm water on the island's sheltered eastern side — quiet, low-rise bungalow resorts and almost nothing else. This is the deliberate antidote to Koh Rong's backpacker party scene next door. Arrive, drop everything, and watch the light go down over the bay.",
          pl:"Trzykilometrowy półksiężyc białego piasku i czystej, spokojnej wody po osłoniętej wschodniej stronie wyspy — ciche, niskie kurorty bungalowowe i niemal nic więcej. To celowe antidotum na backpackerską imprezę na sąsiednim Koh Rong. Przyjedźcie, rzućcie wszystko i patrzcie, jak światło gaśnie nad zatoką."},
    tip:{en:"Power is generator/solar and patchy — embrace the digital detox. Saracen for comfort; M'Pai Bai (Village 23) at the north end is the rustic, cheaper option.",
         pl:"Prąd jest z generatora/solarów i bywa z przerwami — przyjmijcie cyfrowy detoks. Saracen dla wygody; M'Pai Bai (Wioska 23) na północy to opcja rustykalna i tańsza."}}
  ]},

 {n:9,date:{en:"Sun 29 Nov",pl:"niedz 29 lis"},
  title:{en:"Koh Rong Sanloem — island day",pl:"Koh Rong Sanloem — dzień na wyspie"},
  summary:{en:"Snorkel, kayak, walk to a lighthouse, swim with the glow at night. A full day to actually rest.",
           pl:"Snorkeling, kajak, spacer do latarni, nocna kąpiel w blasku planktonu. Pełen dzień na prawdziwy odpoczynek."},
  places:[
   {img:"island2",icon:"🌿",name:{en:"Beaches, reef & jungle",pl:"Plaże, rafa i dżungla"},
    what:{en:"The island is part of Koh Rong Marine National Park, and its small reefs are surprisingly rich — snorkellers report seahorses and nudibranchs. Hop between Saracen, Lazy Beach and Sunset Beach, kayak the calm bay, or take the overgrown jungle path to the old French lighthouse at the southern tip for a view back over the islands.",
          pl:"Wyspa należy do Morskiego Parku Narodowego Koh Rong, a jej małe rafy są zaskakująco bogate — snorkelujący wypatrują koników morskich i ślimaków nagoskrzelnych. Skaczcie między Saracen, Lazy Beach i Sunset Beach, pływajcie kajakiem po spokojnej zatoce albo idźcie zarośniętą dżunglą do starej francuskiej latarni na południowym cyplu po widok na wyspy."},
    tip:{en:"Lazy Beach (west coast) is a short jungle walk over from Saracen and catches the sunset. Reef shoes help on rockier entries.",
         pl:"Lazy Beach (zachodnie wybrzeże) to krótki spacer przez dżunglę z Saracen i łapie zachód słońca. Na kamienistych wejściach przydają się buty do wody."}},
   {img:"islandnight",icon:"⛰",name:{en:"Bioluminescent night swim",pl:"Nocna kąpiel w bioluminescencji"},
    what:{en:"On dark, moonless nights the water off Koh Rong Sanloem lights up: plankton that glow electric-blue when disturbed, so every stroke and kick trails sparks. Wade in off the beach after dinner away from the lights — it's one of those genuinely 'we didn't expect this' moments the trip is built around.",
          pl:"W ciemne, bezksiężycowe noce woda u brzegów Koh Rong Sanloem rozświetla się: plankton świeci elektrycznym błękitem przy poruszeniu, więc każdy ruch ramion i nóg ciągnie iskry. Wejdźcie do wody z plaży po kolacji, z dala od świateł — to jeden z tych prawdziwych momentów „nie spodziewaliśmy się tego”, wokół których zbudowana jest ta podróż."},
    tip:{en:"Best on a moonless night with calm water; darker beaches away from resorts glow strongest. No flash photos — your eyes see it far better than a phone.",
         pl:"Najlepiej w bezksiężycową noc przy spokojnej wodzie; ciemniejsze plaże z dala od kurortów świecą najmocniej. Bez lampy błyskowej — oczy widzą to znacznie lepiej niż telefon."}}
  ]},

 {n:10,date:{en:"Mon 30 Nov",pl:"pon 30 lis"},
  title:{en:"Island morning → Kampot",pl:"Poranek na wyspie → Kampot"},
  summary:{en:"A last swim, the ferry back, and east to the sleepiest, most charming colonial town on the coast.",
           pl:"Ostatnia kąpiel, prom z powrotem i na wschód do najsenniejszego, najbardziej uroczego kolonialnego miasteczka na wybrzeżu."},
  places:[
   {img:"kampot",icon:"🏛",name:{en:"Kampot riverfront",pl:"Nabrzeże Kampot"},
    what:{en:"A faded French-colonial town on a tidal river backed by the Bokor mountain — crumbling shophouses in ochre and teal, a famously slow pace, and some of the best sunsets in Cambodia reflected off the water. After the island, it's an easy place to land: wander the old quarter, find a riverside table, and let the evening drift.",
          pl:"Wyblakłe francusko-kolonialne miasteczko nad pływową rzeką, z górą Bokor w tle — sypiące się kamienice w ochrze i morskiej zieleni, słynne powolne tempo i jedne z najlepszych zachodów słońca w Kambodży odbijające się od wody. Po wyspie to łatwe miejsce na przystanek: powłóczcie się po starej dzielnicy, znajdźcie stolik nad rzeką i pozwólcie wieczorowi płynąć."},
    tip:{en:"Kampot is tiny and walkable. Time your ferry for the morning so you reach town with the afternoon and sunset to spare.",
         pl:"Kampot jest malutkie i spacerowe. Zaplanujcie poranny prom, by dotrzeć do miasta z zapasem na popołudnie i zachód słońca."}}
  ]},

 {n:11,date:{en:"Tue 1 Dec",pl:"wt 1 gru"},
  title:{en:"Bokor Hill Station + pepper",pl:"Uzdrowisko Bokor + pieprz"},
  summary:{en:"Up into the cloud forest to an abandoned French resort with huge views — the single best-fit day of the trip — then the world's most famous pepper.",
           pl:"W górę, w las mglisty, do opuszczonego francuskiego uzdrowiska z ogromnymi widokami — najlepiej pasujący dzień podróży — a potem najsłynniejszy pieprz świata."},
  places:[
   {img:"bokor",icon:"🏛",name:{en:"Bokor Palace Hotel (abandoned)",pl:"Bokor Palace Hotel (opuszczony)"},
    what:{en:"High in Preah Monivong (Bokor) National Park stands the shell of a 1920s French hill station — a grand hotel-casino the colonists built to escape the heat, later abandoned and left to the mist. The empty, weather-stained halls, the old Catholic church nearby and the cloud rolling through are pure explorer-historian territory: an abandoned place, a climb, a story and a view all at once.",
          pl:"Wysoko w Parku Narodowym Preah Monivong (Bokor) stoi skorupa francuskiego uzdrowiska z lat 20. XX wieku — okazały hotel-kasyno, który koloniści zbudowali, by uciec od upału, później opuszczony i pozostawiony mgle. Puste, naznaczone pogodą sale, pobliski stary katolicki kościół i przewalające się chmury to czysty rewir odkrywcy-historyka: opuszczone miejsce, wspinaczka, historia i widok naraz."},
    tip:{en:"The summit makes its own weather — it can be clear or socked in within minutes. Bring a layer; a hire car or chartered van handles the long mountain road.",
         pl:"Szczyt tworzy własną pogodę — w kilka minut bywa pogodnie albo tonie w chmurach. Weźcie warstwę; długą górską drogę ogarnia wynajęte auto lub czarterowany van."}},
   {img:"pepper",icon:"🍜",name:{en:"Kampot pepper plantation",pl:"Plantacja pieprzu Kampot"},
    what:{en:"Kampot pepper is geographically protected and prized by chefs worldwide — vivid, floral and citrusy, grown on small family farms on the plains below Bokor. A short plantation visit shows the vines, the drying yards and the difference between green, black, red and white peppercorns, with tastings straight off the trellis.",
          pl:"Pieprz Kampot ma chronione oznaczenie geograficzne i jest ceniony przez kucharzy na całym świecie — wyrazisty, kwiatowy i cytrusowy, uprawiany na małych rodzinnych farmach na nizinach pod Bokorem. Krótka wizyta na plantacji pokazuje pnącza, suszarnie i różnicę między ziarnami zielonymi, czarnymi, czerwonymi i białymi, z degustacją prosto z rusztowań."},
    tip:{en:"Buy a few packs at the farm — it's cheaper and fresher than anywhere at home, and packs flat in a bag. Combine with the nearby salt fields.",
         pl:"Kupcie kilka paczek na farmie — taniej i świeżej niż gdziekolwiek w kraju, a płasko mieści się w torbie. Połączcie z pobliskimi polami solnymi."}}
  ]},

 {n:12,date:{en:"Wed 2 Dec",pl:"śr 2 gru"},
  title:{en:"Kampot — river & cave temple (flex)",pl:"Kampot — rzeka i jaskiniowa świątynia (elastyczny)"},
  summary:{en:"A slower day: paddle the mangroves, find a pre-Angkorian shrine inside a cave, and build in some rest for the group.",
           pl:"Wolniejszy dzień: spłyńcie przez namorzyny, znajdźcie przedangkorską świątynię w jaskini i wpleciecie trochę odpoczynku dla grupy."},
  places:[

    what:{en:"The Praek Tuek Chhu river and its mangrove channels are made for a paddle — calm, green, and quiet once you're off the main stretch. Many travellers pair an afternoon kayak with a sunset boat cruise back toward town, and on the right nights there's bioluminescence here too. Easy, active, and very Kampot.",
          pl:"Rzeka Praek Tuek Chhu i jej namorzynowe kanały są stworzone do wiosłowania — spokojne, zielone i ciche, gdy zejdziecie z głównego nurtu. Wielu podróżnych łączy popołudniowy kajak z rejsem o zachodzie z powrotem ku miastu, a w odpowiednie noce i tu pojawia się bioluminescencja. Łatwo, aktywnie i bardzo po kampocku."},
    tip:{en:"Guesthouses rent kayaks by the hour. Go upriver away from boat traffic for the quietest water.",

   {img:"phnomchhnork",icon:"🏛",name:{en:"Phnom Chhnork cave temple",pl:"Jaskiniowa świątynia Phnom Chhnork"},
    what:{en:"In the limestone hills outside Kampot, a steep stair leads up to a cave holding a small brick shrine built in the 7th century — pre-Angkorian, older than almost anything at Angkor itself, with a stalactite slowly fusing to its roof. Local kids often guide you through the chamber and out a back passage. A genuine hidden-gem, lightly visited.",
          pl:"W wapiennych wzgórzach pod Kampot strome schody prowadzą do jaskini z małą ceglaną świątynią wzniesioną w VII wieku — przedangkorską, starszą niemal od wszystkiego w samym Angkorze, ze stalaktytem powoli zrastającym się z jej stropem. Miejscowe dzieci często oprowadzają przez komorę i tylnym przejściem na zewnątrz. Prawdziwy ukryty klejnot, rzadko odwiedzany."},

 {n:13,date:{en:"Thu 3 Dec",pl:"czw 3 gru"},

    what:{en:"A tiny seaside town that was Cambodia's glamorous 1960s resort before the war emptied it — its hillsides are still dotted with the gutted shells of modernist villas, slowly being reclaimed. The draw today is the crab market: blue swimmer crabs hauled straight from keeping-baskets in the sea and wok-fried with fresh green Kampot pepper. Eat with your hands at a plastic table over the water.",
          pl:"Maleńkie nadmorskie miasteczko, które w glamour lat 60. było kurortem Kambodży, zanim wojna je opróżniła — na zboczach wciąż stoją wypatroszone skorupy modernistycznych willi, powoli pochłaniane przez naturę. Dziś przyciąga targ krabów: kraby pływające wyciągane prosto z koszy w morzu i smażone na woku ze świeżym zielonym pieprzem Kampot. Jedzcie rękami przy plastikowym stoliku nad wodą."},

          pl:"Z Kep to krótki skok do granicy Prek Chak–Xà Xía, cichego nadmorskiego przejścia do Wietnamu w pobliżu miasta Ha Tien — o wiele bardziej charakterystycznego niż lot. Przechodzicie przez dwa posterunki, a po drugiej stronie jesteście już na wodnym skraju delty Mekongu. Prawdziwy moment pogranicza, ten rodzaj lądowego etapu, który zszywa podróż w całość."},

 {n:16,date:{en:"Sun 6 Dec",pl:"niedz 6 gru"},

  places:[

    what:{en:"The 1960s modernist palace of South Vietnam's president — and the spot where, on 30 April 1975, a North Vietnamese tank crashed the gates to end the war. It's frozen in time: retro war rooms, a rooftop helipad, and a warren of basement command bunkers with period maps and radios. History you can walk through, almost untouched.",

let lang="en";
const $=id=>document.getElementById(id);

function setLang(l){
  lang=l; document.documentElement.lang=l;
  try{localStorage.setItem("vc_lang",l);}catch(e){}
  $("btn-en").classList.toggle("on",l==="en");
  $("btn-pl").classList.toggle("on",l==="pl");
  render();
}

function imgSrc(key){
  const v=IMG[key]||"";
  return v.startsWith("http")?v:P+v;
}

function render(){
  const u=UI[lang];
  $("kicker").textContent=u.kicker;
  $("title").textContent=u.title;
  $("sub").textContent=u.sub;
  $("facts").innerHTML=u.facts.map(f=>`<span>${f}</span>`).join("");
  $("legend").innerHTML=u.legend.map(f=>`<span>${f}</span>`).join("");
  $("foot1").textContent=u.foot1;
  $("foot2").textContent=u.foot2;
  document.title="Vietnam + Cambodia 2026 — "+(lang==="pl"?"Przewodnik dzień po dniu":"Day-by-Day Guide");

  const app=$("app"), nav=$("navrow");
  app.innerHTML=""; nav.innerHTML="";
  const rm=document.createElement('a');rm.href='../route-map/index.html';rm.className='routemap';rm.textContent=u.routemap;nav.appendChild(rm);
  DATA.forEach(item=>{
    if(item.region){
      const r=document.createElement('section');
      r.className='region '+item.region;
      r.innerHTML=`<span class="lbl">${item.lbl[lang]}</span><h2>${item.rh[lang]}</h2><p>${item.rp[lang]}</p>`;
      app.appendChild(r);
      return;
    }
    const id='day'+item.n;
    const a=document.createElement('a');a.href='#'+id;a.textContent=u.day+' '+item.n;nav.appendChild(a);
    const d=document.createElement('section');
    d.className='day'+(item.places.length===1?' full':'');
    d.id=id;
    const ph=item.places.map(p=>`
       <div class="place">
         <div class="ph"><img loading="lazy" src="${imgSrc(p.img)}" alt="${p.name[lang]}"
              onerror="this.parentNode.classList.add('broke')"><span class="ph-label">${p.name[lang]}</span></div>
         <h4>${p.icon} ${p.name[lang]}</h4>
         <p>${p.what[lang]}</p>
         <div class="tip"><b>${u.tip}</b> ${p.tip[lang]}</div>
       </div>`).join('');
    d.innerHTML=`
      <div class="day-head">
        <span class="daynum">${u.DAY} ${item.n}</span>
        <span class="date">${item.date[lang]}</span>
        <h3>${item.title[lang]}</h3>
      </div>
      <p class="day-summary">${item.summary[lang]}</p>
      <div class="places">${ph}</div>`;
    app.appendChild(d);
  });
}

let saved="en";
try{
  const s=localStorage.getItem("vc_lang");
  if(s==="pl"||s==="en"){saved=s;}
  else if((navigator.language||"").toLowerCase().startsWith("pl")){saved="pl";}
}catch(e){}
setLang(saved);
</script>
