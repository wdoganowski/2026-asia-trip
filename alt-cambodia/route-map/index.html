         pl:[["Turkish Airlines","https://www.turkishairlines.com"]]}};
const LEGS=[
 {a:0,b:1,type:"road"},{a:1,b:2,type:"boat"},{a:2,b:0,type:"road",faint:true},
 {a:0,b:3,type:"flight"},{a:3,b:4,type:"boat"},{a:4,b:5,type:"boat"},
 {a:5,b:6,type:"road"},{a:6,b:7,type:"border"},{a:7,b:8,type:"road"}];
const STYLE={road:{stroke:"#1f7a5a",dash:null,w:3.5},boat:{stroke:"#2f6db0",dash:"2 5",w:3.5},
 flight:{stroke:"#b8602a",dash:"1 5",w:3.5},border:{stroke:"#7a4fb0",dash:"9 5",w:3.5}};
const LNG0=102.0, LNG1=109.8, LAT0=8.3, LAT1=23.6, W=560, H=780, OX=20, OY=20;
const px=l=>(l-LNG0)/(LNG1-LNG0)*W+OX, py=l=>(LAT1-l)/(LAT1-LAT0)*H+OY, P=(a,b)=>[px(a),py(b)];
const VN=[
 [105.3,23.3],[106.6,22.9],[107.4,22.4],[106.7,21.9],[108.1,21.6],
 [107.4,20.9],[106.8,20.3],[105.8,19.5],[106.0,18.7],[106.5,17.9],
 [107.0,17.1],[107.6,16.5],[108.2,16.1],[109.2,15.0],[109.3,13.4],
 [109.2,12.3],[108.5,11.4],[107.5,10.6],[106.8,10.4],[106.2,9.6],
 [105.0,8.6],[104.8,9.7],[104.6,10.5],[105.3,10.9],[106.0,11.7],
 [105.9,12.3],[106.4,13.9],[107.5,14.6],[107.6,15.4],[107.0,15.9],
 [106.4,16.6],[105.8,17.4],[104.7,17.9],[104.0,18.3],[103.9,19.2],
 [104.5,20.2],[103.8,20.8],[103.2,21.3],[102.9,22.0],[103.2,22.6],
 [104.0,22.6],[104.8,23.0],[105.3,23.3]];
const KH=[
 [102.5,13.6],[103.6,14.3],[104.7,14.4],[105.5,14.2],[106.0,14.0],
 [106.6,13.9],[107.5,12.3],[106.8,11.6],[106.2,11.0],[105.9,10.9],
 [104.6,10.5],[104.0,10.5],[103.5,10.6],[103.2,11.0],[103.0,11.7],
 [102.5,11.9],[102.35,12.6],[102.5,13.6]];
const SVG="http://www.w3.org/2000/svg", map=document.getElementById("map");
const el=(t,a)=>{const e=document.createElementNS(SVG,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
let lang="en", cur=0;
const $=id=>document.getElementById(id);

function landPath(coords){let d="M"; coords.forEach((c,i)=>{const [x,y]=P(c[0],c[1]); d+=(i?"L":"")+x.toFixed(1)+" "+y.toFixed(1)+" ";}); return d+"Z";}
function airport(stopIdx, dx, dy, label){
  const [x,y]=P(STOPS[stopIdx].lng,STOPS[stopIdx].lat);
  const t=el("text",{class:"air",x:x+dx,y:y+dy,"text-anchor":"middle"}); t.textContent=label; map.appendChild(t);
}
function clabel(lng,lat,txt){const [x,y]=P(lng,lat); const t=el("text",{class:"clabel",x:x,y:y,"text-anchor":"middle"}); t.textContent=txt; map.appendChild(t);}
function buildMap(){
  const u=UI[lang];
  map.innerHTML="";
  map.appendChild(el("rect",{x:0,y:0,width:600,height:820,fill:"#eaf3f8"}));
  map.appendChild(el("path",{d:landPath(KH), fill:"#dfeede", stroke:"#bcd3ba","stroke-width":1.2,"stroke-linejoin":"round"}));
  map.appendChild(el("path",{d:landPath(VN), fill:"#dfeede", stroke:"#bcd3ba","stroke-width":1.2,"stroke-linejoin":"round"}));
  clabel(104.0,19.2,u.countryVN); clabel(104.6,12.9,u.countryKH);
  LEGS.forEach(L=>{
    const s=STYLE[L.type]; const [x1,y1]=P(STOPS[L.a].lng,STOPS[L.a].lat), [x2,y2]=P(STOPS[L.b].lng,STOPS[L.b].lat);
    let node;
    if(L.type==="flight"){const mx=(x1+x2)/2-90,my=(y1+y2)/2; node=el("path",{d:`M${x1} ${y1} Q ${mx} ${my} ${x2} ${y2}`,fill:"none"});}
    else node=el("line",{x1,y1,x2,y2});
    node.setAttribute("stroke",s.stroke); node.setAttribute("stroke-width",L.faint?2:s.w); node.setAttribute("stroke-linecap","round");
    if(L.faint)node.setAttribute("opacity","0.4"); if(s.dash)node.setAttribute("stroke-dasharray",s.dash);
    map.appendChild(node);
  });
  airport(0, 38, -16, u.flyIn);
  airport(8, 42, 14, u.flyOut);
  STOPS.forEach((s,i)=>{
    const [x,y]=P(s.lng,s.lat); const g=el("g",{class:"node"}); g.dataset.i=i;
    g.appendChild(el("circle",{cx:x,cy:y,r:14,fill:"#fff",opacity:"0.0"}));
    g.appendChild(el("circle",{class:"dot",cx:x,cy:y,r:9,fill:i===cur?"#b8602a":"#1f7a5a",stroke:"#fff","stroke-width":2.5}));
    const num=el("text",{x:x,y:y+3.5,"text-anchor":"middle","font-size":"10","font-weight":"700",fill:"#fff"}); num.textContent=i+1; g.appendChild(num);
    const leftSide=[3,4,5,7].includes(i);
    const lx=leftSide?x-14:x+15, anchor=leftSide?"end":"start";
    const lab=el("text",{class:"nlabel",x:lx,y:y-2,"text-anchor":anchor}); lab.textContent=s.n[lang]; g.appendChild(lab);
    const dd=el("text",{class:"ndays",x:lx,y:y+11,"text-anchor":anchor}); dd.textContent=s.days[lang].split(" · ")[0]; g.appendChild(dd);
    g.addEventListener("click",()=>select(i)); map.appendChild(g);
  });
}
function legBlock(label, mode, meta, links){
  return `<p class="seclabel">${label}</p>`+
    `<div class="leg"><p class="legmode">${mode}</p><p class="legmeta">${meta}</p>`+
    `<div class="links">${links.map(l=>`<a href="${l[1]}" target="_blank" rel="noopener">${l[0]} ↗</a>`).join("")}</div></div>`;
}
function legendHTML(u){
  const sw=[
   '<svg class="legline" viewBox="0 0 34 6"><line x1="1" y1="3" x2="33" y2="3" stroke="#1f7a5a" stroke-width="4" stroke-linecap="round"/></svg>',
   '<svg class="legline" viewBox="0 0 34 6"><line x1="1" y1="3" x2="33" y2="3" stroke="#2f6db0" stroke-width="4" stroke-dasharray="2 5" stroke-linecap="round"/></svg>',
   '<svg class="legline" viewBox="0 0 34 6"><line x1="1" y1="3" x2="33" y2="3" stroke="#b8602a" stroke-width="4" stroke-dasharray="1 5" stroke-linecap="round"/></svg>',
   '<svg class="legline" viewBox="0 0 34 6"><line x1="1" y1="3" x2="33" y2="3" stroke="#7a4fb0" stroke-width="4" stroke-dasharray="9 5" stroke-linecap="round"/></svg>',
   '<span style="color:#b8602a;font-weight:700">✈</span>'];
  let h=`<h3>${u.legendTitle}</h3>`;
  for(let i=0;i<5;i++) h+=`<div class="legrow">${sw[i]} ${u.legendRows[i]}</div>`;
  return h;
}
function select(i){
  cur=i;
  const s=STOPS[i], u=UI[lang];
  let html =
    `<span class="badge">${u.badge(i+1,STOPS.length)}</span><h2>${s.n[lang]}</h2>`+
    `<p class="days">${s.days[lang]}</p>`+
    (s.day?`<a class="daylink" href="../daily-guide/index.html#day${s.day}">${u.daylink}</a>`:"")+
    legBlock(u.gettingHere, s.mode[lang], s.meta[lang], s.links[lang])+
    `<p class="seclabel">${u.highlights}</p><ul>${s.hi[lang].map(h=>`<li>${h}</li>`).join("")}</ul>`;
  if(s.flyout) html += legBlock(u.onward, FLYOUT.mode[lang], FLYOUT.meta[lang], FLYOUT.links[lang]);
  document.getElementById("stopcard").innerHTML = html;
  document.querySelectorAll(".node .dot").forEach((d,j)=>d.setAttribute("fill", j===i?"#b8602a":"#1f7a5a"));
}
function render(){
  const u=UI[lang];
  document.documentElement.lang=lang;
  document.title="Vietnam + Cambodia 2026 — "+(lang==="pl"?"Mapa trasy":"Route Map");
  $("title").textContent=u.title;
  $("sub").textContent=u.sub;
  $("toplink").textContent=u.toplink;
  $("legend").innerHTML=legendHTML(u);
  $("hint").textContent=u.hint;
  buildMap();
  select(cur);
}
function setLang(l){
  lang=l;
  try{localStorage.setItem("vc_lang",l);}catch(e){}
  $("btn-en").classList.toggle("on",l==="en");
  $("btn-pl").classList.toggle("on",l==="pl");
  render();
}
let saved="en";
try{
  const s=localStorage.getItem("vc_lang");
  if(s==="pl"||s==="en"){saved=s;}
  else if((navigator.language||"").toLowerCase().startsWith("pl")){saved="pl";}
}catch(e){}
setLang(saved);
</script>
</body>
</html>
