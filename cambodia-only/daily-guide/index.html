  .facts{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:22px}
  .facts span{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);

  nav.days .row{display:flex;gap:6px;overflow-x:auto;max-width:1080px;margin:0 auto;padding:0 16px}
  nav.days a{flex:0 0 auto;text-decoration:none;color:var(--muted);font-family:Helvetica,Arial,sans-serif;
    font-size:13px;border:1px solid var(--line);border-radius:8px;padding:6px 10px;background:#fff;white-space:nowrap}
  nav.days a:hover{color:var(--ink);border-color:var(--gold)}
  nav.days a.routemap{color:#fff;background:var(--green);border-color:var(--green);font-weight:700}

  .region{margin:46px 0 8px;text-align:center}

  .region h2{font-size:26px;margin:.3em 0 .1em} .region p{color:var(--muted);margin:.2em auto;max-width:640px}
  .day{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);
    padding:26px 26px 10px;margin:22px 0;scroll-margin-top:64px}
  .day-head{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;border-bottom:2px solid var(--line);padding-bottom:12px}
  .daynum{font-family:Helvetica,Arial,sans-serif;font-weight:700;font-size:13px;letter-spacing:.1em;
    color:#fff;background:var(--green);border-radius:8px;padding:6px 10px}

  .day-head h3{font-size:23px;margin:0;flex:1 1 100%}
  .day-summary{color:var(--muted);font-style:italic;margin:14px 0 4px}

  .place{display:flex;flex-direction:column}
  .ph{position:relative;width:100%;aspect-ratio:16/10;border-radius:12px;overflow:hidden;background:#dfe6e0}
  .ph img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease}
  .place:hover .ph img{transform:scale(1.05)}
  .ph .ph-label{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    text-align:center;padding:14px;color:#fff;font-family:Helvetica,Arial,sans-serif;font-size:15px;
    background:linear-gradient(135deg,#1f5f4f,#2d6e8e)}
  .ph.broke{background:none}.ph.broke img{display:none}.ph.broke .ph-label{display:flex}
  .place h4{margin:12px 0 4px;font-size:18px}
  .place h4 .tag{font-family:Helvetica,Arial,sans-serif;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--gold);border:1px solid var(--gold);border-radius:5px;padding:2px 6px;margin-left:6px;vertical-align:middle}
  .place p{margin:.2em 0 .5em;font-size:15.3px}
  .tip{font-family:Helvetica,Arial,sans-serif;font-size:13px;background:#f3f5ef;border-left:3px solid var(--gold);
    padding:8px 12px;border-radius:0 8px 8px 0;color:#4a5450}
  .tip b{color:var(--ink)}
  .full .places{grid-template-columns:1fr}
  footer{margin:50px 0 30px;padding-top:20px;border-top:1px solid var(--line);color:var(--muted);
    font-family:Helvetica,Arial,sans-serif;font-size:13px;text-align:center}
  .legend{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin:10px 0}
  .legend span{font-size:12px}
  .gallery{position:relative;width:100%;aspect-ratio:16/10;border-radius:12px;overflow:hidden;background:#dfe6e0}
  .gallery .track{display:flex;height:100%;transition:transform .35s ease}
  .gallery .slide{flex:0 0 100%;height:100%}
  .gallery .slide img{width:100%;height:100%;object-fit:cover;display:block}
  .gallery .gnav{position:absolute;top:50%;transform:translateY(-50%);width:34px;height:34px;border:0;border-radius:50%;
    background:rgba(0,0,0,.42);color:#fff;font-size:20px;line-height:1;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center}
  .gallery .gnav.prev{left:8px}.gallery .gnav.next{right:8px}
  .gallery .gnav:hover{background:rgba(0,0,0,.66)}
  .gallery .gdots{position:absolute;bottom:8px;left:0;right:0;display:flex;gap:5px;justify-content:center;z-index:2}
  .gallery .gdots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.55)}
  .gallery .gdots i.on{background:#fff}
  .gallery .ph-label{position:absolute;inset:0;display:none;align-items:center;justify-content:center;text-align:center;
    padding:14px;color:#fff;font-family:Helvetica,Arial,sans-serif;font-size:15px;background:linear-gradient(135deg,#1f5f4f,#2d6e8e);z-index:1}
  .gallery.broke .ph-label{display:flex}
  .gallery.broke .gnav,.gallery.broke .gdots{display:none}
  .gcredit{font-family:Helvetica,Arial,sans-serif;font-size:11px;color:#9aa6b2;margin:5px 2px 0;min-height:14px;line-height:1.3}
  .gcredit a{color:#9aa6b2;text-decoration:none}
  .gcredit a:hover{text-decoration:underline}
</style>

    what:{en:"A vast, largely un-restored temple ~60 km east, collapsed into great mossy heaps of sandstone and roots, with walkways picking through the rubble. There are almost no crowds and no ropes — the closest thing to 'discovering' a lost temple. Pure explorer territory if the group wants the adventure.",
          pl:"Ogromna, w większości nieodrestaurowana świątynia ~60 km na wschód, zapadnięta w wielkie omszałe stosy piaskowca i korzeni, z kładkami wijącymi się przez gruzowisko. Niemal bez tłumów i bez barierek — najbliżej „odkrywania” zaginionej świątyni. Czysty rewir odkrywcy, jeśli grupa chce przygody."},
    tip:{en:"Adds ~1.5 h each way — make it the day's centrepiece or swap for Preah Khan + Neak Pean closer in if you'd rather a lighter day.",
         pl:"Dokłada ~1,5 h w jedną stronę — uczyńcie z niej oś dnia albo zamieńcie na bliższe Preah Khan + Neak Pean, jeśli wolicie lżejszy dzień."}},
   {img:"phare",icon:"🍜",name:{en:"Old Market & the Phare circus",pl:"Stary Targ i cyrk Phare"},
    what:{en:"Back in town for the evening: the Old Market (Psar Chas) for souvenirs and street snacks, Artisans Angkor's silk and carving workshops, and a foot-massage to recover from the temples. Then the Phare Cambodian Circus — not animals but a high-energy show of acrobatics, theatre and live music that retells Cambodian history, staged by a school that grew out of a refugee camp.",
          pl:"Wieczór z powrotem w mieście: Stary Targ (Psar Chas) na pamiątki i przekąski, warsztaty jedwabiu i rzeźby Artisans Angkor oraz masaż stóp po świątyniach. Potem cyrk Phare Cambodian Circus — bez zwierząt, lecz pełen energii pokaz akrobatyki, teatru i muzyki na żywo, który opowiada historię Kambodży, wystawiany przez szkołę wyrosłą z obozu dla uchodźców."},
    tip:{en:"Book Phare tickets ahead for the group; the cheaper seats are fine. You'll see the Tonlé Sap and its floating villages tomorrow from the boat, so no separate lake day is needed.",
         pl:"Zarezerwujcie bilety na Phare z wyprzedzeniem dla grupy; tańsze miejsca są dobre. Tonlé Sap i jego pływające wioski zobaczycie jutro z łodzi, więc osobny dzień na jezioro nie jest potrzebny."}}
  ]},

 {region:"northwest",
  lbl:{en:"The Northwest — Battambang",pl:"Północny zachód — Battambang"},
  rh:{en:"Late November — warm and dry, the lake still high",pl:"Koniec listopada — ciepło i sucho, jezioro wciąż wysokie"},
  rp:{en:"The trip's signature transport leg — a day-long boat across the Tonlé Sap — delivers you to Cambodia's most charming colonial town and its bamboo train, bat caves and hilltop temples.",
      pl:"Znakowy odcinek transportowy wyprawy — całodniowa łódź przez Tonlé Sap — dowozi was do najbardziej uroczego kolonialnego miasta Kambodży, do jego bambusowego pociągu, jaskiń nietoperzy i świątyń na wzgórzach."}},

 {n:4,date:{en:"Wed 25 Nov",pl:"śr 25 lis"},
  title:{en:"Tonlé Sap boat to Battambang",pl:"Łódź przez Tonlé Sap do Battambang"},
  summary:{en:"The whole day is the experience: across the great lake and up a jungle river, past floating villages, to Battambang.",
           pl:"Cały dzień jest atrakcją: przez wielkie jezioro i w górę dżunglowej rzeki, obok pływających wiosek, do Battambang."},
  places:[
   {img:"tonleboat",icon:"🚲",name:{en:"Siem Reap → Battambang by boat",pl:"Siem Reap → Battambang łodzią"},
    what:{en:"Cambodia's answer to the sleeper train: a 5–9 hour boat that crosses the open Tonlé Sap, then threads for hours up the narrow, jungle-lined Sangker river. You pass floating villages, fish farms, stilt houses, kids paddling to school and flooded forest at eye level the whole way. Slow and basic — and one of the most memorable journeys in the country. It runs only at high water, which late November provides.",
          pl:"Kambodżańska odpowiedź na pociąg sypialny: 5–9-godzinna łódź przez otwarte Tonlé Sap, a potem godziny w górę wąskiej, otulonej dżunglą rzeki Sangker. Mijacie pływające wioski, hodowle ryb, domy na palach, dzieci wiosłujące do szkoły i zalany las na wysokości oczu przez całą drogę. Wolno i skromnie — i jedna z najbardziej pamiętnych podróży w kraju. Kursuje tylko przy wysokiej wodzie, którą zapewnia koniec listopada."},
    tip:{en:"Reconfirm it's running ~2–3 weeks out; keep a private van (~3 h) as a fallback. Sit on top for the views; bring water, sun cover and snacks.",
         pl:"Potwierdźcie, że kursuje, na ~2–3 tygodnie przed; miejcie prywatny van (~3 h) jako rezerwę. Siądźcie na górze dla widoków; weźcie wodę, ochronę przeciwsłoneczną i przekąski."}},
   {img:"floatvillage",icon:"🌿",name:{en:"Floating-village life",pl:"Życie pływającej wioski"},
    what:{en:"The river is a moving exhibition of life on the water — floating shops and churches, houses that rise and fall with the season, nets and traps strung across the channels. It is the most intimate way to see how a third of Cambodia lives off the Tonlé Sap, the heartbeat of the country's fishery.",
          pl:"Rzeka to ruchoma wystawa życia na wodzie — pływające sklepy i kościoły, domy, które wznoszą się i opadają wraz z porą roku, sieci i pułapki rozpięte w kanałach. To najbardziej kameralny sposób, by zobaczyć, jak jedna trzecia Kambodży żyje z Tonlé Sap, serca rybołówstwa kraju."},
    tip:{en:"Have your camera ready but ask before close-up portraits. The light is best in the first and last hours of the run.",
         pl:"Miejcie aparat gotowy, ale pytajcie przed portretami z bliska. Światło jest najlepsze w pierwszych i ostatnich godzinach rejsu."}}
  ]},

 {n:5,date:{en:"Thu 26 Nov",pl:"czw 26 lis"},
  title:{en:"Battambang — bamboo train & bat caves",pl:"Battambang — bambusowy pociąg i jaskinie nietoperzy"},
  summary:{en:"A norry ride across the rice fields, a hilltop temple with a dark history, and the day's grand finale: a sky-filling river of bats.",
           pl:"Przejażdżka norry przez pola ryżowe, świątynia na wzgórzu z mroczną historią i wielki finał dnia: wypełniająca niebo rzeka nietoperzy."},
  places:[
   {img:"bambootrain",icon:"🚲",name:{en:"The bamboo train (norry)",pl:"Bambusowy pociąg (norry)"},
    what:{en:"A flat bamboo platform on two sets of train wheels, driven by a little belt-driven motor, racing along a single warped, gappy track through the paddies. When two norries meet, the lighter one is lifted off and reassembled in a minute to let the other pass. Improvised, slightly absurd, and tremendous fun — peak 'unusual transport'.",
          pl:"Płaska bambusowa platforma na dwóch zestawach kolejowych kół, napędzana małym silnikiem na pasku, pędząca po pojedynczym, powyginanym torze przez pola ryżowe. Gdy dwie norry się spotykają, lżejszą zdejmuje się i składa z powrotem w minutę, by przepuścić drugą. Improwizowane, lekko absurdalne i świetna zabawa — szczyt „nietypowego transportu”."},
    tip:{en:"The original O Dambong line is the classic; agree the price up front. Hold onto hats — it's faster than it looks.",
         pl:"Klasyczna jest pierwotna linia O Dambong; ustalcie cenę z góry. Trzymajcie czapki — jedzie szybciej, niż wygląda."}},
   {img:"phnomsampeau",icon:"🏛",name:{en:"Phnom Sampeau — killing caves & bat exodus",pl:"Phnom Sampeau — jaskinie śmierci i wylot nietoperzy"},
    what:{en:"A limestone hill topped by a golden temple with views across the plain, but also a sobering site: caves the Khmer Rouge used as execution sites, now quiet memorials. Then, at dusk, the spectacle — millions of bats stream from a cliff cave in a single unbroken ribbon across the sky for half an hour. History, viewpoint and natural wonder stacked in one hill.",
          pl:"Wapienne wzgórze zwieńczone złotą świątynią z widokiem na równinę, ale i otrzeźwiające miejsce: jaskinie, których Czerwoni Khmerzy używali do egzekucji, dziś ciche miejsca pamięci. A potem, o zmierzchu, widowisko — miliony nietoperzy wypływają z jaskini w klifie jedną nieprzerwaną wstęgą przez niebo przez pół godziny. Historia, punkt widokowy i cud natury w jednym wzgórzu."},
    tip:{en:"Be in position by ~5:30pm for the bat exodus; bring a drink and settle in. The macaques on the road can be cheeky — mind your snacks.",
         pl:"Bądźcie na miejscu ok. 17:30 na wylot nietoperzy; weźcie napój i usiądźcie. Makaki na drodze bywają bezczelne — pilnujcie przekąsek."}},
   {img:"colonial",icon:"🏛",name:{en:"Wat Banan & the colonial town",pl:"Wat Banan i kolonialne miasto"},
    what:{en:"Battambang has Cambodia's best-kept French-colonial streetscape — ochre shophouses, shuttered villas and a sleepy riverfront that reward an aimless wander and a good coffee. Out of town, the five-tower hilltop temple of Wat Banan (a small, steep Angkor-in-miniature) gives another viewpoint over the rice country.",
          pl:"Battambang ma najlepiej zachowaną francusko-kolonialną tkankę ulic w Kambodży — ochrowe kamienice, willę z okiennicami i senne nabrzeże, które nagradzają bezcelowy spacer i dobrą kawę. Poza miastem pięciowieżowa świątynia na wzgórzu Wat Banan (mały, stromy Angkor w miniaturze) daje kolejny widok na ryżowy kraj."},
    tip:{en:"The town is small and walkable; rent bicycles for a half-day loop. Wat Banan's ~360 steps are worth it for the view.",
         pl:"Miasto jest małe i spacerowe; wypożyczcie rowery na półdniową pętlę. ~360 stopni Wat Banan warto pokonać dla widoku."}}
  ]},

 {region:"capital",
  lbl:{en:"The Capital — Phnom Penh",pl:"Stolica — Phnom Penh"},
  rh:{en:"Late Nov / early Dec — warm, dry, riverine",pl:"Koniec lis / początek gru — ciepło, sucho, nadrzecznie"},
  rp:{en:"Where three rivers meet: the glittering Royal Palace and the country's finest Khmer art, balanced against the heavy, essential history of the Khmer Rouge years.",
      pl:"Gdzie spotykają się trzy rzeki: lśniący Pałac Królewski i najwspanialsza khmerska sztuka kraju, zrównoważone ciężką, niezbędną historią lat Czerwonych Khmerów."}},

 {n:6,date:{en:"Fri 27 Nov",pl:"pt 27 lis"},
  title:{en:"Battambang → Phnom Penh",pl:"Battambang → Phnom Penh"},
  summary:{en:"A half-day on the road to the capital, landing gently on the riverfront at dusk.",
           pl:"Pół dnia w drodze do stolicy, łagodne wejście na nabrzeże o zmierzchu."},
  places:[
   {img:"ppriver",icon:"⛰",name:{en:"Sisowath Quay & the river confluence",pl:"Sisowath Quay i zbieg rzek"},
    what:{en:"After a ~5–6 hour drive, Phnom Penh greets you where the Mekong, the Tonlé Sap and the Bassac rivers meet — a broad, busy waterfront promenade where the city comes out to walk at dusk. Grab a riverside seat for a sundowner and watch the boats and the food carts. The gentle way to arrive in the capital.",
          pl:"Po ~5–6-godzinnej jeździe Phnom Penh wita was tam, gdzie spotykają się Mekong, Tonlé Sap i Bassac — szeroka, ruchliwa nadrzeczna promenada, na którą miasto wychodzi o zmierzchu. Zajmijcie miejsce nad rzeką na drinka o zachodzie i patrzcie na łodzie i wózki z jedzeniem. Łagodny sposób na przyjazd do stolicy."},
    tip:{en:"Tuk-tuks and the Grab/PassApp ride apps are the easy, cheap way around the city. The quay is best explored on foot.",
         pl:"Tuk-tuki oraz aplikacje Grab/PassApp to łatwy i tani sposób na poruszanie się po mieście. Nabrzeże najlepiej zwiedzać pieszo."}}
  ]},

 {n:7,date:{en:"Sat 28 Nov",pl:"sob 28 lis"},
  title:{en:"Phnom Penh — the hard history & the gold",pl:"Phnom Penh — trudna historia i złoto"},
  summary:{en:"A sobering but essential morning understanding the Khmer Rouge years, balanced by the Royal Palace and the serene Khmer art of the National Museum.",
           pl:"Otrzeźwiający, ale niezbędny poranek poświęcony latom Czerwonych Khmerów, zrównoważony Pałacem Królewskim i spokojną khmerską sztuką Muzeum Narodowego."},
  places:[
   {img:"tuolsleng",icon:"🏛",name:{en:"Tuol Sleng (S-21) Genocide Museum",pl:"Muzeum Ludobójstwa Tuol Sleng (S-21)"},
    what:{en:"A former school the Khmer Rouge turned into the S-21 prison, where thousands were detained and tortured between 1975 and 1979. The classrooms, cells and harrowing archive of photographs are preserved almost untouched. It is heavy and quiet, and it is the necessary context for everything else you'll see in Cambodia.",
          pl:"Dawna szkoła zamieniona przez Czerwonych Khmerów w więzienie S-21, gdzie w latach 1975–1979 przetrzymywano i torturowano tysiące ludzi. Sale lekcyjne, cele i wstrząsające archiwum fotografii zachowano niemal nietknięte. To ciężkie i ciche miejsce — i niezbędny kontekst dla wszystkiego, co jeszcze zobaczycie w Kambodży."},
    tip:{en:"Take the included audio guide — the survivor testimony is what makes it land. Emotionally draining; don't over-schedule the day.",
         pl:"Weźcie dołączony audioprzewodnik — to świadectwa ocalałych robią największe wrażenie. Wyczerpujące emocjonalnie; nie przeładowujcie tego dnia."}},
   {img:"killingfields",icon:"🏛",name:{en:"Choeung Ek Killing Fields",pl:"Pola Śmierci Choeung Ek"},
    what:{en:"About 15 km out of town, the best-known of the killing fields where S-21 prisoners were executed. Today it is a memorial: quiet paths between the grave pits and a central stupa holding thousands of skulls. The audio tour is measured and humane rather than sensational. Pairing it with S-21 completes the story in one morning.",
          pl:"Około 15 km za miastem — najbardziej znane z pól śmierci, gdzie egzekwowano więźniów S-21. Dziś to miejsce pamięci: ciche ścieżki między dołami grobowymi i centralna stupa mieszcząca tysiące czaszek. Audioprzewodnik jest wyważony i ludzki, nie sensacyjny. Połączenie z S-21 domyka historię w jeden poranek."},
    tip:{en:"Go in the morning before the heat. A tuk-tuk can wait and bring you back; agree the round-trip fare first.",
         pl:"Jedźcie rano, zanim zrobi się upalnie. Tuk-tuk może poczekać i zawieźć z powrotem; ustalcie cenę za kurs w obie strony z góry."}},
   {img:"royalpalace",icon:"🏛",name:{en:"Royal Palace & Silver Pagoda",pl:"Pałac Królewski i Srebrna Pagoda"},
    what:{en:"Cambodia's working royal residence since the 1860s — a compound of golden-roofed Khmer pavilions, throne halls and the Silver Pagoda, its floor laid with over 5,000 silver tiles and home to an emerald Buddha and a life-size gold one studded with diamonds. A glittering, living counterpoint to the morning's hard history.",
          pl:"Czynna rezydencja królewska Kambodży od lat 60. XIX wieku — kompleks khmerskich pawilonów o złotych dachach, sal tronowych i Srebrnej Pagody, której podłogę wyłożono ponad 5000 srebrnych płytek; mieści szmaragdowego Buddę i naturalnej wielkości złotego, wysadzanego diamentami. Lśniący, żywy kontrapunkt dla trudnej porannej historii."},
    tip:{en:"Cover shoulders and knees (a scarf does the job). Go late afternoon as the heat eases and the gold catches low light.",
         pl:"Zakryjcie ramiona i kolana (wystarczy chusta). Idźcie późnym popołudniem, gdy upał słabnie, a złoto chwyta niskie światło."}},
   {img:"natmus",icon:"🌿",name:{en:"National Museum of Cambodia",pl:"Muzeum Narodowe Kambodży"},
    what:{en:"A graceful terracotta pavilion holding the world's finest collection of Khmer sculpture — serene sandstone gods and kings rescued from Angkor and the pre-Angkorian temples. After the morning's weight, an hour here among the Angkorian masterpieces is a deliberate, restorative counterbalance.",
          pl:"Pełen wdzięku terakotowy pawilon mieszczący najwspanialszą na świecie kolekcję khmerskiej rzeźby — spokojne piaskowcowe bóstwa i królowie ocaleni z Angkoru i świątyń przedangkorskich. Po ciężarze poranka godzina wśród angkorskich arcydzieł to celowa, regenerująca przeciwwaga."},
    tip:{en:"Photography is limited inside; the open central courtyard is lovely and free to shoot.",
         pl:"Fotografowanie wewnątrz jest ograniczone; otwarty centralny dziedziniec jest piękny i można go swobodnie fotografować."}}
  ]},

 {region:"coast",
  lbl:{en:"South Coast — Kampot, Bokor & Kep",pl:"Południowe wybrzeże — Kampot, Bokor i Kep"},
  rh:{en:"Early December — dry and warm, the south's wettest month past",pl:"Początek grudnia — sucho i ciepło, najwilgotniejszy miesiąc południa już za nami"},
  rp:{en:"A faded colonial river town under a cloud-forest mountain, an abandoned French hill station, the world's most prized pepper, and a crab-market seaside town strewn with modernist ruins.",
      pl:"Wyblakłe kolonialne miasteczko nad rzeką u stóp góry w lesie mglistym, opuszczone francuskie uzdrowisko, najbardziej ceniony pieprz świata i nadmorskie miasteczko z targiem krabów usiane modernistycznymi ruinami."}},

 {n:8,date:{en:"Sun 29 Nov",pl:"niedz 29 lis"},
  title:{en:"Phnom Penh → Kampot",pl:"Phnom Penh → Kampot"},
  summary:{en:"South to the sleepiest, most charming colonial town on the coast, in time for the sunset on the river.",
           pl:"Na południe do najsenniejszego, najbardziej uroczego kolonialnego miasteczka na wybrzeżu, w sam raz na zachód słońca nad rzeką."},
  places:[
   {img:"kampot",icon:"🏛",name:{en:"Kampot riverfront",pl:"Nabrzeże Kampot"},
    what:{en:"A faded French-colonial town on a tidal river backed by the Bokor mountain — crumbling shophouses in ochre and teal, a famously slow pace, and some of the best sunsets in Cambodia reflected off the water. After the road from the capital (~3.5–4 h), it's an easy place to land: wander the old quarter, find a riverside table, and let the evening drift.",
          pl:"Wyblakłe francusko-kolonialne miasteczko nad pływową rzeką, z górą Bokor w tle — sypiące się kamienice w ochrze i morskiej zieleni, słynne powolne tempo i jedne z najlepszych zachodów słońca w Kambodży odbijające się od wody. Po drodze ze stolicy (~3,5–4 h) to łatwe miejsce na przystanek: powłóczcie się po starej dzielnicy, znajdźcie stolik nad rzeką i pozwólcie wieczorowi płynąć."},
    tip:{en:"Kampot is tiny and walkable. Base here three nights — Bokor and Kep are both easy day trips, so you only unpack once.",
         pl:"Kampot jest malutkie i spacerowe. Zatrzymajcie się tu na trzy noce — Bokor i Kep to łatwe jednodniowe wypady, więc rozpakowujecie się tylko raz."}}
  ]},

 {n:9,date:{en:"Mon 30 Nov",pl:"pon 30 lis"},
  title:{en:"Bokor Hill Station + pepper",pl:"Uzdrowisko Bokor + pieprz"},
  summary:{en:"Up into the cloud forest to an abandoned French resort with huge views — the single best-fit day of the trip — then the world's most famous pepper.",
           pl:"W górę, w las mglisty, do opuszczonego francuskiego uzdrowiska z ogromnymi widokami — najlepiej pasujący dzień podróży — a potem najsłynniejszy pieprz świata."},
  places:[
   {img:"bokor",icon:"🏛",name:{en:"Bokor Palace Hotel (abandoned)",pl:"Bokor Palace Hotel (opuszczony)"},
    what:{en:"High in Preah Monivong (Bokor) National Park stands the shell of a 1920s French hill station — a grand hotel-casino the colonists built to escape the heat, later abandoned and left to the mist. The empty, weather-stained halls, the old Catholic church nearby and the cloud rolling through are pure explorer-historian territory: an abandoned place, a climb, a story and a view all at once.",
          pl:"Wysoko w Parku Narodowym Preah Monivong (Bokor) stoi skorupa francuskiego uzdrowiska z lat 20. XX wieku — okazały hotel-kasyno, który koloniści zbudowali, by uciec od upału, później opuszczony i pozostawiony mgle. Puste, naznaczone pogodą sale, pobliski stary katolicki kościół i przewalające się chmury to czysty rewir odkrywcy-historyka: opuszczone miejsce, wspinaczka, historia i widok naraz."},
    tip:{en:"The summit makes its own weather — clear or socked-in within minutes. Bring a layer; a chartered van handles the long mountain road.",
         pl:"Szczyt tworzy własną pogodę — w kilka minut bywa pogodnie albo tonie w chmurach. Weźcie warstwę; długą górską drogę ogarnia czarterowany van."}},
   {img:"pepper",icon:"🍜",name:{en:"Kampot pepper plantation",pl:"Plantacja pieprzu Kampot"},
    what:{en:"Kampot pepper is geographically protected and prized by chefs worldwide — vivid, floral and citrusy, grown on small family farms on the plains below Bokor. A short plantation visit shows the vines, the drying yards and the difference between green, black, red and white peppercorns, with tastings straight off the trellis.",
          pl:"Pieprz Kampot ma chronione oznaczenie geograficzne i jest ceniony przez kucharzy na całym świecie — wyrazisty, kwiatowy i cytrusowy, uprawiany na małych rodzinnych farmach na nizinach pod Bokorem. Krótka wizyta na plantacji pokazuje pnącza, suszarnie i różnicę między ziarnami zielonymi, czarnymi, czerwonymi i białymi, z degustacją prosto z rusztowań."},
    tip:{en:"Buy a few packs at the farm — cheaper and fresher than at home, and it packs flat. Combine with the nearby salt fields.",
         pl:"Kupcie kilka paczek na farmie — taniej i świeżej niż w kraju, a płasko się pakuje. Połączcie z pobliskimi polami solnymi."}}
  ]},

 {n:10,date:{en:"Tue 1 Dec",pl:"wt 1 gru"},
  title:{en:"Kep day trip — crab, villas & a cave temple",pl:"Wypad do Kep — kraby, wille i jaskiniowa świątynia"},
  summary:{en:"Blue crab with green pepper, abandoned modernist villas and a gulf viewpoint — then back to Kampot for the river at dusk.",
           pl:"Niebieski krab z zielonym pieprzem, opuszczone modernistyczne wille i widok na zatokę — potem powrót do Kampot na rzekę o zmierzchu."},
  places:[
   {img:"kep",icon:"🍜",name:{en:"Kep — crab market & faded villas",pl:"Kep — targ krabów i wyblakłe wille"},
    what:{en:"A tiny seaside town that was Cambodia's glamorous 1960s resort before the war emptied it — its hillsides are still dotted with the gutted shells of modernist villas, slowly being reclaimed. The draw today is the crab market: blue swimmer crabs hauled straight from keeping-baskets in the sea and wok-fried with fresh green Kampot pepper. Eat with your hands at a plastic table over the water.",
          pl:"Maleńkie nadmorskie miasteczko, które w glamour lat 60. było kurortem Kambodży, zanim wojna je opróżniła — na zboczach wciąż stoją wypatroszone skorupy modernistycznych willi, powoli pochłaniane przez naturę. Dziś przyciąga targ krabów: kraby pływające wyciągane prosto z koszy w morzu i smażone na woku ze świeżym zielonym pieprzem Kampot. Jedzcie rękami przy plastikowym stoliku nad wodą."},
    tip:{en:"A short walk in Kep National Park gives a viewpoint over the gulf and Rabbit Island. Optional: a boat to Koh Tonsay (Rabbit Island) for a rustic beach hour.",
         pl:"Krótki spacer w Parku Narodowym Kep daje widok na zatokę i Wyspę Króliczą. Opcjonalnie: łódź na Koh Tonsay (Wyspę Króliczą) na rustykalną godzinę na plaży."}},
   {img:"phnomchhnork",icon:"🏛",name:{en:"Phnom Chhnork cave temple (+ Kampot river)",pl:"Jaskiniowa świątynia Phnom Chhnork (+ rzeka Kampot)"},

let lang="en";
const $=id=>document.getElementById(id);

function setLang(l){
  lang=l; document.documentElement.lang=l;
  try{localStorage.setItem("kh_lang",l);}catch(e){}
  $("btn-en").classList.toggle("on",l==="en");
  $("btn-pl").classList.toggle("on",l==="pl");
  render();
}

function render(){
  const u=UI[lang];
  $("kicker").textContent=u.kicker;
  $("title").textContent=u.title;
  $("sub").textContent=u.sub;
  $("facts").innerHTML=u.facts.map(f=>`<span>${f}</span>`).join("");
  $("legend").innerHTML=u.legend.map(f=>`<span>${f}</span>`).join("");
  $("foot1").textContent=u.foot1;
  $("foot2").textContent=u.foot2;
  document.title="Cambodia 2026 — "+(lang==="pl"?"Przewodnik dzień po dniu":"Day-by-Day Guide");

  const app=$("app"), nav=$("navrow");
  app.innerHTML=""; nav.innerHTML="";
  const rm=document.createElement('a');rm.href='../route-map/index.html';rm.className='routemap';rm.textContent=u.routemap;nav.appendChild(rm);
  DATA.forEach(item=>{
    if(item.region){
      const r=document.createElement('section');
      r.className='region '+item.region;
      r.innerHTML=`<span class="lbl">${item.lbl[lang]}</span><h2>${item.rh[lang]}</h2><p>${item.rp[lang]}</p>`;
      app.appendChild(r);
      return;
    }
    const id='day'+item.n;
    const a=document.createElement('a');a.href='#'+id;a.textContent=u.day+' '+item.n;nav.appendChild(a);
    const d=document.createElement('section');
    d.className='day'+(item.places.length===1?' full':'');
    d.id=id;
    const ph=item.places.map(p=>`
       <div class="place">
         <div class="gallery broke" data-img="${p.img}"><div class="track"></div>
              <button class="gnav prev" aria-label="Previous photo">‹</button>
              <button class="gnav next" aria-label="Next photo">›</button>
              <div class="gdots"></div><span class="ph-label">${p.name[lang]}</span></div>
         <div class="gcredit"></div>
         <h4>${p.icon} ${p.name[lang]}</h4>
         <p>${p.what[lang]}</p>
         <div class="tip"><b>${u.tip}</b> ${p.tip[lang]}</div>
       </div>`).join('');
    d.innerHTML=`
      <div class="day-head">
        <span class="daynum">${u.DAY} ${item.n}</span>
        <span class="date">${item.date[lang]}</span>
        <h3>${item.title[lang]}</h3>
      </div>
      <p class="day-summary">${item.summary[lang]}</p>
      <div class="places">${ph}</div>`;
    app.appendChild(d);
  });
  buildGalleries();
}

// Build a swipeable photo carousel per card from a tuned Wikimedia Commons search
// (JSONP, so it works from a local file:// page). Seeds a known-good image first
// where available, then appends landscape search results with per-photo credit.
const COMMONS='https://commons.wikimedia.org/';
function stripHTML(h){const d=document.createElement('div');d.innerHTML=h||'';return (d.textContent||'').replace(/\s+/g,' ').trim();}
function buildGalleries(){
  document.querySelectorAll('.gallery[data-img]').forEach((g,gi)=>{
    if(g.dataset.done) return; g.dataset.done="1";
    const key=g.getAttribute('data-img');
    const q=QUERY[key]||key, seed=SEED[key], slides=[];
    if(seed){ slides.push({src:COMMONS+'wiki/Special:FilePath/'+encodeURIComponent(seed)+'?width=1200',
                           page:COMMONS+'wiki/File:'+encodeURIComponent(seed), credit:''}); }
    const cb='__gc'+gi+'_'+Date.now();
    const s=document.createElement('script');
    window[cb]=function(data){
      try{
        const pages=data&&data.query&&data.query.pages;
        if(pages){
          Object.keys(pages).map(k=>pages[k]).sort((a,b)=>(a.index||99)-(b.index||99)).forEach(pg=>{
            if(slides.length>=5) return;
            const ii=pg.imageinfo&&pg.imageinfo[0]; if(!ii) return;
            if(ii.mime&&ii.mime.indexOf('image/')!==0) return;
            if(ii.width&&ii.height&&ii.width<ii.height*0.95) return; // landscape only
            const file=pg.title.replace(/^File:/,'');
            if(seed&&file===seed) return;
            const md=ii.extmetadata||{};
            const artist=stripHTML(md.Artist&&md.Artist.value);
            const lic=(md.LicenseShortName&&md.LicenseShortName.value)||'';
            slides.push({src:ii.thumburl||ii.url, page:ii.descriptionurl,
                         credit:[artist,lic].filter(Boolean).join(' · ')});
          });
        }
      }catch(e){}
      renderCarousel(g,slides); delete window[cb]; s.remove();
    };
    s.onerror=function(){ renderCarousel(g,slides); delete window[cb]; s.remove(); };
    s.src=COMMONS+'w/api.php?action=query&format=json&generator=search&gsrnamespace=6&gsrlimit=24'
        +'&gsrsearch='+encodeURIComponent(q+' filetype:bitmap')
        +'&prop=imageinfo&iiprop=url|size|mime|extmetadata&iiurlwidth=1200&callback='+cb;
    document.body.appendChild(s);
  });
}
function renderCarousel(g,slides){
  const credit=g.parentNode.querySelector('.gcredit');
  if(!slides.length) return;                 // leave the labelled placeholder
  g.classList.remove('broke');
  const track=g.querySelector('.track'), dots=g.querySelector('.gdots');
  track.innerHTML=slides.map(s=>'<div class="slide"><img loading="lazy" alt="" src="'+s.src+'"></div>').join('');
  dots.innerHTML=slides.map((_,i)=>'<i class="'+(i?'':'on')+'"></i>').join('');
  let idx=0;
  function show(i){
    idx=(i+slides.length)%slides.length;
    track.style.transform='translateX('+(-idx*100)+'%)';
    dots.querySelectorAll('i').forEach((d,j)=>d.classList.toggle('on',j===idx));
    if(credit){ const s=slides[idx];
      credit.innerHTML = s.credit ? '📷 <a href="'+(s.page||'#')+'" target="_blank" rel="noopener">'+s.credit+'</a>'
                                  : (s.page?'📷 <a href="'+s.page+'" target="_blank" rel="noopener">Wikimedia Commons</a>':''); }
  }
  g.querySelector('.prev').onclick=()=>show(idx-1);
  g.querySelector('.next').onclick=()=>show(idx+1);
  if(slides.length<2){ g.querySelector('.prev').style.display='none'; g.querySelector('.next').style.display='none'; dots.style.display='none'; }
  let x0=null;
  g.addEventListener('touchstart',e=>{x0=e.touches[0].clientX;},{passive:true});
  g.addEventListener('touchend',e=>{ if(x0==null) return; const dx=e.changedTouches[0].clientX-x0; if(Math.abs(dx)>40) show(idx+(dx<0?1:-1)); x0=null; });
  show(0);
}

let saved="en";
try{
  const s=localStorage.getItem("kh_lang");
  if(s==="pl"||s==="en"){saved=s;}
  else if((navigator.language||"").toLowerCase().startsWith("pl")){saved="pl";}
}catch(e){}
setLang(saved);
</script>
