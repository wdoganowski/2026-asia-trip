    g.appendChild(el("circle",{cx:x,cy:y,r:14,fill:"#fff",opacity:"0.0"}));
    g.appendChild(el("circle",{class:"dot",cx:x,cy:y,r:9,fill:i===cur?"#b8602a":"#1f7a5a",stroke:"#fff","stroke-width":2.5}));
    const num=el("text",{x:x,y:y+3.5,"text-anchor":"middle","font-size":"10","font-weight":"700",fill:"#fff"}); num.textContent=i+1; g.appendChild(num);
    const leftSide=[1,3,5].includes(i);
    const lx=leftSide?x-14:x+15, anchor=leftSide?"end":"start";
    const lab=el("text",{class:"nlabel",x:lx,y:y-2,"text-anchor":anchor}); lab.textContent=s.n[lang]; g.appendChild(lab);
    const dd=el("text",{class:"ndays",x:lx,y:y+11,"text-anchor":anchor}); dd.textContent=s.days[lang].split(" · ")[0]; g.appendChild(dd);
    g.addEventListener("click",()=>select(i)); map.appendChild(g);
  });
}
function legBlock(label, mode, meta, links){
  return `<p class="seclabel">${label}</p>`+
    `<div class="leg"><p class="legmode">${mode}</p><p class="legmeta">${meta}</p>`+
    `<div class="links">${links.map(l=>`<a href="${l[1]}" target="_blank" rel="noopener">${l[0]} ↗</a>`).join("")}</div></div>`;
}
function legendHTML(u){
  const sw=[
   '<svg class="legline" viewBox="0 0 34 6"><line x1="1" y1="3" x2="33" y2="3" stroke="#1f7a5a" stroke-width="4" stroke-linecap="round"/></svg>',
   '<svg class="legline" viewBox="0 0 34 6"><line x1="1" y1="3" x2="33" y2="3" stroke="#2f6db0" stroke-width="4" stroke-dasharray="2 5" stroke-linecap="round"/></svg>',
   '<svg class="legline" viewBox="0 0 34 6"><line x1="1" y1="3" x2="33" y2="3" stroke="#b8602a" stroke-width="4" stroke-dasharray="1 5" stroke-linecap="round"/></svg>',
   '<span style="color:#b8602a;font-weight:700">✈</span>'];
  let h=`<h3>${u.legendTitle}</h3>`;
  for(let i=0;i<4;i++) h+=`<div class="legrow">${sw[i]} ${u.legendRows[i]}</div>`;
  return h;
}
function select(i){
  cur=i;
  const s=STOPS[i], u=UI[lang];
  let html =
    `<span class="badge">${u.badge(i+1,STOPS.length)}</span><h2>${s.n[lang]}</h2>`+
    `<p class="days">${s.days[lang]}</p>`+
    (s.day?`<a class="daylink" href="../daily-guide/index.html#day${s.day}">${u.daylink}</a>`:"")+
    legBlock(u.gettingHere, s.mode[lang], s.meta[lang], s.links[lang])+
    `<p class="seclabel">${u.highlights}</p><ul>${s.hi[lang].map(h=>`<li>${h}</li>`).join("")}</ul>`;
  if(s.flyout) html += legBlock(u.onward, FLYOUT.mode[lang], FLYOUT.meta[lang], FLYOUT.links[lang]);
  document.getElementById("stopcard").innerHTML = html;
  document.querySelectorAll(".node .dot").forEach((d,j)=>d.setAttribute("fill", j===i?"#b8602a":"#1f7a5a"));
}
function render(){
  const u=UI[lang];
  document.documentElement.lang=lang;
  document.title="Cambodia 2026 — "+(lang==="pl"?"Mapa trasy":"Route Map");
  $("title").textContent=u.title;
  $("sub").textContent=u.sub;
  $("toplink").textContent=u.toplink;
  $("legend").innerHTML=legendHTML(u);
  $("hint").textContent=u.hint;
  buildMap();
  select(cur);
}
function setLang(l){
  lang=l;
  try{localStorage.setItem("khc_lang",l);}catch(e){}
  $("btn-en").classList.toggle("on",l==="en");
  $("btn-pl").classList.toggle("on",l==="pl");
  render();
}
let saved="en";
try{
  const s=localStorage.getItem("khc_lang");
  if(s==="pl"||s==="en"){saved=s;}
  else if((navigator.language||"").toLowerCase().startsWith("pl")){saved="pl";}
}catch(e){}
setLang(saved);
</script>
